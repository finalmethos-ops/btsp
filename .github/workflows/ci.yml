name: BTSP CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend lint and test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      ENVIRONMENT: local
      APP_NAME: BTSP
      APP_VERSION: 0.1.0
      SECRET_KEY: ci-secret-key
      DATABASE_URL: postgresql+psycopg://btsp:btsp@localhost:5432/btsp
      REDIS_URL: redis://localhost:6379/0
      CORS_ORIGINS: http://localhost:3000
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: btsp
          POSTGRES_USER: btsp
          POSTGRES_PASSWORD: btsp
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U btsp -d btsp"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m pip install --upgrade pip
      - run: pip install -r requirements.txt
      - run: ruff check app tests
      - run: alembic upgrade head
      - run: pytest

  frontend:
    name: Frontend install and build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npx tsc --noEmit -p tsconfig.app.json
      - run: npm run build

  compose:
    name: Compose validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: cp .env.example .env
      - run: docker compose config
